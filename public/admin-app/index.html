<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VetClub Admin</title>
  <!-- Bootstrap 5.3.8 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons 1.13.1 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <!-- AdminLTE 4.0.0 CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0/dist/css/adminlte.min.css">
  <style>
    .login-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #e9ecef; }
    .login-box { width: 400px; max-width: 90%; }
    .brand-link { display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.5rem; font-weight: 600; }
    .brand-link i { font-size: 2rem; color: #dc3545; }
    .nav-sidebar .nav-link { border-radius: 0.375rem; margin: 2px 8px; }
    .nav-sidebar .nav-link.active { background: rgba(255,255,255,0.15); font-weight: 600; }
    .nav-sidebar .nav-link:hover { background: rgba(255,255,255,0.1); }
    .small-box { border-radius: 0.5rem; position: relative; overflow: hidden; }
    .small-box .icon { position: absolute; top: 10px; right: 15px; font-size: 4rem; opacity: 0.3; }
    .content-wrapper { padding: 20px; }
    .table-actions .btn { padding: 0.2rem 0.5rem; font-size: 0.85rem; }
    .article-form label { font-weight: 600; color: #495057; }
    .search-highlight { background: #fff3cd; padding: 2px 4px; border-radius: 3px; }
    .nav-sidebar .nav-header { text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.5px; }
    [data-lte-toggle="sidebar"] { cursor: pointer; }
  </style>
</head>
<body class="layout-fixed sidebar-expand-lg">
  <div id="root"></div>

  <!-- React 18.3.1 -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <!-- ReactDOM 18.3.1 -->
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel Standalone 7.24.7 -->
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js"></script>
  <!-- Bootstrap 5.3.8 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <!-- AdminLTE 4.0.0 JS -->
  <script src="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0/dist/js/adminlte.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ===================== API =====================
    const API = {
      login: (login, password) => fetch('/api/admin/login', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ login, password }), credentials: 'include'
      }),
      logout: () => fetch('/api/admin/logout', { method: 'POST', credentials: 'include' }),
      checkAuth: () => fetch('/api/admin/debug', { credentials: 'include' }),
      getArticles: () => fetch('/api/admin/articles', { credentials: 'include' }),
      getArticle: (id) => fetch(`/api/admin/articles/${id}`, { credentials: 'include' }),
      saveArticle: (id, data) => fetch(`/api/admin/articles/${id}`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data), credentials: 'include'
      }),
      deleteArticle: (id) => fetch(`/api/admin/articles/${id}`, {
        method: 'DELETE', credentials: 'include'
      }),
      search: (q) => fetch(`/api/search?q=${encodeURIComponent(q)}`, { credentials: 'include' })
    };

    // ===================== LoginPage =====================
    function LoginPage({ onLogin }) {
      const [login, setLogin] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        if (!login.trim() || !password.trim()) { setError('Введите логин и пароль'); return; }
        setLoading(true);
        try {
          const res = await API.login(login, password);
          const data = await res.json();
          if (data.success) { onLogin(); }
          else { setError(data.message || 'Неверный логин или пароль'); }
        } catch (err) { setError('Ошибка соединения с сервером'); }
        setLoading(false);
      };

      return (
        <div className="login-page">
          <div className="login-box">
            <div className="card shadow">
              <div className="card-header text-center bg-white border-0 pt-4 pb-2">
                <div className="brand-link text-dark text-decoration-none">
                  <i className="bi bi-heart-pulse-fill"></i>
                  <span>VetClub Admin</span>
                </div>
              </div>
              <div className="card-body p-4">
                <p className="text-muted text-center mb-4">Вход в панель управления</p>
                {error && <div className="alert alert-danger">{error}</div>}
                <form onSubmit={handleSubmit}>
                  <div className="mb-3">
                    <label className="form-label">Логин</label>
                    <div className="input-group">
                      <span className="input-group-text"><i className="bi bi-person"></i></span>
                      <input type="text" className="form-control" placeholder="Введите логин"
                        value={login} onChange={e => setLogin(e.target.value)} />
                    </div>
                  </div>
                  <div className="mb-4">
                    <label className="form-label">Пароль</label>
                    <div className="input-group">
                      <span className="input-group-text"><i className="bi bi-lock"></i></span>
                      <input type="password" className="form-control" placeholder="Введите пароль"
                        value={password} onChange={e => setPassword(e.target.value)} />
                    </div>
                  </div>
                  <button type="submit" className="btn btn-primary w-100" disabled={loading}>
                    {loading ? <><span className="spinner-border spinner-border-sm me-2"></span>Вход...</> : 'Войти'}
                  </button>
                </form>
              </div>
            </div>
            <p className="text-center text-muted mt-3 small">&copy; 2025 VetClub.ru</p>
          </div>
        </div>
      );
    }

    // ===================== Sidebar =====================
    function Sidebar({ page, onNavigate }) {
      const menuItems = [
        { id: 'dashboard', icon: 'bi-speedometer', label: 'Dashboard' },
        { id: 'articles', icon: 'bi-file-text', label: 'Статьи' },
        { id: 'search', icon: 'bi-search', label: 'Поиск' }
      ];

      return (
        <aside className="app-sidebar bg-body-secondary shadow" data-bs-theme="dark">
          <div className="sidebar-brand border-bottom border-secondary py-3 px-3 d-flex align-items-center gap-2">
            <i className="bi bi-heart-pulse-fill text-danger fs-4"></i>
            <span className="brand-text fw-bold fs-5">VetClub Admin</span>
          </div>
          <div className="sidebar-wrapper">
            <nav className="mt-2">
              <ul className="nav sidebar-menu flex-column" data-lte-toggle="treeview" role="menu" data-accordion="false">
                {menuItems.map(item => (
                  <li className="nav-item" key={item.id}>
                    <a href="#" className={`nav-link ${page === item.id ? 'active' : ''}`}
                      onClick={e => { e.preventDefault(); onNavigate(item.id); }}>
                      <i className={`nav-icon bi ${item.icon}`}></i>
                      <p>{item.label}</p>
                    </a>
                  </li>
                ))}
                <li className="nav-header text-secondary px-3 mt-2 mb-1">Система</li>
                <li className="nav-item">
                  <a href="#" className="nav-link" onClick={e => { e.preventDefault(); onNavigate('logout'); }}>
                    <i className="nav-icon bi bi-box-arrow-right"></i>
                    <p>Выход</p>
                  </a>
                </li>
              </ul>
            </nav>
          </div>
        </aside>
      );
    }

    // ===================== Header =====================
    function Header({ onToggleSidebar, onLogout }) {
      return (
        <nav className="app-header navbar navbar-expand bg-body-secondary shadow-sm">
          <div className="container-fluid">
            <ul className="navbar-nav">
              <li className="nav-item">
                <a className="nav-link" href="#" data-lte-toggle="sidebar" role="button" onClick={onToggleSidebar}>
                  <i className="bi bi-list"></i>
                </a>
              </li>
            </ul>
            <span className="navbar-brand mx-auto fw-semibold">VetClub Admin</span>
            <ul className="navbar-nav ms-auto">
              <li className="nav-item dropdown">
                <a className="nav-link d-flex align-items-center gap-2" href="#" onClick={e => { e.preventDefault(); onLogout(); }}>
                  <i className="bi bi-box-arrow-right"></i>
                  <span className="d-none d-md-inline">Выйти</span>
                </a>
              </li>
            </ul>
          </div>
        </nav>
      );
    }

    // ===================== DashboardPage =====================
    function DashboardPage({ onNavigate }) {
      const [articles, setArticles] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');

      useEffect(() => {
        API.getArticles()
          .then(r => r.json())
          .then(data => { setArticles(data.articles || []); setLoading(false); })
          .catch(() => { setError('Ошибка загрузки данных'); setLoading(false); });
      }, []);

      const total = articles.length;
      const categories = [...new Set(articles.map(a => a.category).filter(Boolean))].length;
      const published = articles.filter(a => a.published !== false).length;
      const drafts = total - published;
      const recent = [...articles].sort((a, b) => (b.id || 0) - (a.id || 0)).slice(0, 5);

      const statCards = [
        { title: 'Всего статей', value: total, icon: 'bi-file-text', color: 'primary' },
        { title: 'Категорий', value: categories, icon: 'bi-folder', color: 'success' },
        { title: 'Публикаций', value: published, icon: 'bi-check-circle', color: 'warning' },
        { title: 'Драфтов', value: drafts, icon: 'bi-pencil-square', color: 'danger' }
      ];

      return (
        <div className="content-wrapper">
          <div className="content-header">
            <div className="container-fluid">
              <div className="row mb-3">
                <div className="col-sm-6"><h1 className="m-0">Dashboard</h1></div>
              </div>
            </div>
          </div>
          <div className="content">
            <div className="container-fluid">
              {error && <div className="alert alert-danger">{error}</div>}
              {loading ? (
                <div className="text-center py-5"><div className="spinner-border text-primary"></div></div>
              ) : (
                <>
                  <div className="row">
                    {statCards.map((card, i) => (
                      <div className="col-lg-3 col-md-6 col-12" key={i}>
                        <div className={`small-box bg-${card.color} text-white`}>
                          <div className="inner p-3">
                            <h3>{card.value}</h3>
                            <p>{card.title}</p>
                          </div>
                          <div className="icon"><i className={`bi ${card.icon}`}></i></div>
                        </div>
                      </div>
                    ))}
                  </div>
                  <div className="card shadow-sm">
                    <div className="card-header bg-white">
                      <h3 className="card-title mb-0"><i className="bi bi-clock-history me-2"></i>Последние статьи</h3>
                    </div>
                    <div className="card-body p-0">
                      <table className="table table-hover mb-0">
                        <thead className="table-light">
                          <tr><th>ID</th><th>Название</th><th>Категория</th><th></th></tr>
                        </thead>
                        <tbody>
                          {recent.length === 0 ? (
                            <tr><td colSpan="4" className="text-center text-muted py-4">Нет статей</td></tr>
                          ) : recent.map(a => (
                            <tr key={a.id}>
                              <td className="text-muted" style={{width:60}}>{a.id}</td>
                              <td>{a.title || a.h1 || '(без названия)'}</td>
                              <td><span className="badge bg-secondary">{a.category || '-'}</span></td>
                              <td className="text-end">
                                <button className="btn btn-sm btn-outline-primary" onClick={() => onNavigate('editor', a.id)}>
                                  <i className="bi bi-pencil"></i>
                                </button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ===================== ArticlesPage =====================
    function ArticlesPage({ onNavigate }) {
      const [articles, setArticles] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState('');
      const [filter, setFilter] = useState('');
      const [deleteId, setDeleteId] = useState(null);
      const [deleteLoading, setDeleteLoading] = useState(false);

      const fetchArticles = useCallback(() => {
        setLoading(true);
        API.getArticles()
          .then(r => r.json())
          .then(data => { setArticles(data.articles || []); setLoading(false); })
          .catch(() => { setError('Ошибка загрузки статей'); setLoading(false); });
      }, []);

      useEffect(() => { fetchArticles(); }, [fetchArticles]);

      const filtered = articles.filter(a =>
        (a.title || a.h1 || '').toLowerCase().includes(filter.toLowerCase())
      );

      const handleDelete = async (id) => {
        if (!confirm('Удалить статью?')) return;
        setDeleteId(id); setDeleteLoading(true);
        try {
          const res = await API.deleteArticle(id);
          if (res.ok) { setArticles(prev => prev.filter(a => a.id !== id)); }
          else { setError('Ошибка удаления'); }
        } catch { setError('Ошибка соединения'); }
        setDeleteId(null); setDeleteLoading(false);
      };

      return (
        <div className="content-wrapper">
          <div className="content-header">
            <div className="container-fluid">
              <div className="row mb-3 align-items-center">
                <div className="col-sm-6"><h1 className="m-0">Статьи</h1></div>
                <div className="col-sm-6 text-end">
                  <button className="btn btn-primary" onClick={() => onNavigate('editor', 'new')}>
                    <i className="bi bi-plus-lg me-2"></i>Новая статья
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div className="content">
            <div className="container-fluid">
              {error && <div className="alert alert-danger alert-dismissible">
                {error} <button type="button" className="btn-close" onClick={() => setError('')}></button>
              </div>}
              <div className="card shadow-sm">
                <div className="card-header bg-white">
                  <div className="row align-items-center">
                    <div className="col-md-4 ms-auto">
                      <div className="input-group">
                        <span className="input-group-text"><i className="bi bi-search"></i></span>
                        <input type="text" className="form-control" placeholder="Поиск по названию..."
                          value={filter} onChange={e => setFilter(e.target.value)} />
                        {filter && <button className="btn btn-outline-secondary" onClick={() => setFilter('')}><i className="bi bi-x-lg"></i></button>}
                      </div>
                    </div>
                  </div>
                </div>
                <div className="card-body p-0">
                  {loading ? (
                    <div className="text-center py-5"><div className="spinner-border text-primary"></div></div>
                  ) : (
                    <div className="table-responsive">
                      <table className="table table-hover table-striped mb-0">
                        <thead className="table-light">
                          <tr>
                            <th style={{width:60}}>ID</th>
                            <th>Название</th>
                            <th>Категория</th>
                            <th className="text-end" style={{width:140}}>Действия</th>
                          </tr>
                        </thead>
                        <tbody>
                          {filtered.length === 0 ? (
                            <tr><td colSpan="4" className="text-center text-muted py-5">{filter ? 'Ничего не найдено' : 'Нет статей'}</td></tr>
                          ) : filtered.map(a => (
                            <tr key={a.id}>
                              <td className="text-muted">{a.id}</td>
                              <td>
                                <span className="fw-medium">{a.title || a.h1 || '(без названия)'}</span>
                                {a.slug && <div className="small text-muted">{a.slug}</div>}
                              </td>
                              <td><span className="badge bg-secondary">{a.category || '-'}</span></td>
                              <td className="text-end table-actions">
                                <button className="btn btn-outline-primary me-1" title="Редактировать"
                                  onClick={() => onNavigate('editor', a.id)}>
                                  <i className="bi bi-pencil"></i>
                                </button>
                                <button className="btn btn-outline-danger" title="Удалить"
                                  onClick={() => handleDelete(a.id)} disabled={deleteLoading && deleteId === a.id}>
                                  {deleteLoading && deleteId === a.id ? <span className="spinner-border spinner-border-sm"></span> : <i className="bi bi-trash"></i>}
                                </button>
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>
                <div className="card-footer bg-white text-muted small">
                  Всего: {filtered.length} {filtered.length !== articles.length && `(из ${articles.length})`}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ===================== ArticleEditorPage =====================
    function ArticleEditorPage({ articleId, onNavigate, onBack }) {
      const isNew = articleId === 'new';
      const [form, setForm] = useState({
        id: '', title: '', h1: '', meta_title: '', meta_description: '', meta_keywords: '',
        category: '', slug: '', content: '', published: true
      });
      const [loading, setLoading] = useState(!isNew);
      const [saving, setSaving] = useState(false);
      const [deleting, setDeleting] = useState(false);
      const [error, setError] = useState('');
      const [success, setSuccess] = useState('');

      useEffect(() => {
        if (isNew) { setLoading(false); return; }
        API.getArticle(articleId)
          .then(r => r.json())
          .then(data => {
            const a = data.article || {};
            setForm({
              id: a.id || '', title: a.title || '', h1: a.h1 || '',
              meta_title: a.meta_title || '', meta_description: a.meta_description || '',
              meta_keywords: a.meta_keywords || '', category: a.category || '',
              slug: a.slug || '', content: a.content || '', published: a.published !== false
            });
            setLoading(false);
          })
          .catch(() => { setError('Ошибка загрузки статьи'); setLoading(false); });
      }, [articleId, isNew]);

      const handleChange = (field, value) => setForm(prev => ({ ...prev, [field]: value }));

      const handleSave = async () => {
        if (!form.title.trim() && !form.h1.trim()) { setError('Введите заголовок'); return; }
        setSaving(true); setError(''); setSuccess('');
        try {
          const payload = { ...form };
          if (isNew) delete payload.id;
          const res = await API.saveArticle(isNew ? 'new' : articleId, payload);
          const data = await res.json();
          if (res.ok) { setSuccess('Сохранено!'); if (data.id && isNew) { form.id = data.id; } }
          else { setError(data.message || 'Ошибка сохранения'); }
        } catch { setError('Ошибка соединения'); }
        setSaving(false);
      };

      const handleDelete = async () => {
        if (!confirm('Удалить статью?')) return;
        setDeleting(true);
        try {
          const res = await API.deleteArticle(articleId);
          if (res.ok) { onBack(); }
          else { setError('Ошибка удаления'); }
        } catch { setError('Ошибка соединения'); }
        setDeleting(false);
      };

      if (loading) return <div className="content-wrapper text-center py-5"><div className="spinner-border text-primary"></div></div>;

      return (
        <div className="content-wrapper">
          <div className="content-header">
            <div className="container-fluid">
              <div className="row mb-3 align-items-center">
                <div className="col-sm-6">
                  <h1 className="m-0">{isNew ? 'Новая статья' : 'Редактировать статью'}</h1>
                </div>
                <div className="col-sm-6 text-end">
                  <button className="btn btn-outline-secondary me-2" onClick={onBack}>
                    <i className="bi bi-arrow-left me-2"></i>Отмена
                  </button>
                  {!isNew && (
                    <button className="btn btn-outline-danger me-2" onClick={handleDelete} disabled={deleting}>
                      {deleting ? <span className="spinner-border spinner-border-sm me-2"></span> : <i className="bi bi-trash me-2"></i>}
                      Удалить
                    </button>
                  )}
                  <button className="btn btn-primary" onClick={handleSave} disabled={saving}>
                    {saving ? <span className="spinner-border spinner-border-sm me-2"></span> : <i className="bi bi-check-lg me-2"></i>}
                    Сохранить
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div className="content">
            <div className="container-fluid">
              {error && <div className="alert alert-danger">{error}</div>}
              {success && <div className="alert alert-success alert-dismissible">{success}<button className="btn-close" onClick={() => setSuccess('')}></button></div>}
              <div className="card shadow-sm article-form">
                <div className="card-body">
                  <div className="row">
                    <div className="col-md-8">
                      <div className="mb-3">
                        <label className="form-label">ID</label>
                        <input type="text" className="form-control" value={form.id} disabled />
                      </div>
                      <div className="mb-3">
                        <label className="form-label">Заголовок (H1) *</label>
                        <input type="text" className="form-control" value={form.h1} onChange={e => handleChange('h1', e.target.value)} placeholder="Заголовок статьи" />
                      </div>
                      <div className="mb-3">
                        <label className="form-label">Title (meta)</label>
                        <input type="text" className="form-control" value={form.meta_title} onChange={e => handleChange('meta_title', e.target.value)} placeholder="Meta title" />
                      </div>
                      <div className="mb-3">
                        <label className="form-label">Описание (meta)</label>
                        <textarea className="form-control" rows="2" value={form.meta_description} onChange={e => handleChange('meta_description', e.target.value)} placeholder="Meta description"></textarea>
                      </div>
                      <div className="mb-3">
                        <label className="form-label">Ключевые слова</label>
                        <input type="text" className="form-control" value={form.meta_keywords} onChange={e => handleChange('meta_keywords', e.target.value)} placeholder="keyword1, keyword2, keyword3" />
                      </div>
                      <div className="mb-3">
                        <label className="form-label">Контент</label>
                        <textarea className="form-control font-monospace" rows="20" value={form.content} onChange={e => handleChange('content', e.target.value)} placeholder="HTML контент статьи..."></textarea>
                      </div>
                    </div>
                    <div className="col-md-4">
                      <div className="card bg-light">
                        <div className="card-body">
                          <h6 className="card-title fw-bold mb-3">Настройки</h6>
                          <div className="mb-3">
                            <label className="form-label">Категория</label>
                            <input type="text" className="form-control" value={form.category} onChange={e => handleChange('category', e.target.value)} placeholder="Категория" />
                          </div>
                          <div className="mb-3">
                            <label className="form-label">Slug (URL)</label>
                            <input type="text" className="form-control" value={form.slug} onChange={e => handleChange('slug', e.target.value)} placeholder="nazvanie-stati" />
                          </div>
                          <div className="mb-3 form-check">
                            <input type="checkbox" className="form-check-input" id="publishedCheck"
                              checked={form.published} onChange={e => handleChange('published', e.target.checked)} />
                            <label className="form-check-label" htmlFor="publishedCheck">Опубликована</label>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ===================== SearchPage =====================
    function SearchPage() {
      const [query, setQuery] = useState('');
      const [results, setResults] = useState([]);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [searched, setSearched] = useState(false);

      const handleSearch = async () => {
        if (!query.trim()) return;
        setLoading(true); setError(''); setSearched(true);
        try {
          const res = await API.search(query.trim());
          const data = await res.json();
          setResults(data.results || data.articles || []);
        } catch { setError('Ошибка поиска'); }
        setLoading(false);
      };

      const highlight = (text, q) => {
        if (!text || !q) return text;
        const parts = text.split(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi'));
        return parts.map((part, i) =>
          part.toLowerCase() === q.toLowerCase() ? <span key={i} className="search-highlight">{part}</span> : part
        );
      };

      return (
        <div className="content-wrapper">
          <div className="content-header">
            <div className="container-fluid">
              <div className="row mb-3">
                <div className="col-sm-6"><h1 className="m-0">Поиск</h1></div>
              </div>
            </div>
          </div>
          <div className="content">
            <div className="container-fluid">
              <div className="row justify-content-center">
                <div className="col-md-8">
                  <div className="input-group input-group-lg mb-4 shadow-sm">
                    <span className="input-group-text bg-white border-end-0"><i className="bi bi-search text-muted"></i></span>
                    <input type="text" className="form-control border-start-0" placeholder="Введите запрос..."
                      value={query} onChange={e => setQuery(e.target.value)}
                      onKeyDown={e => e.key === 'Enter' && handleSearch()} />
                    <button className="btn btn-primary" onClick={handleSearch} disabled={loading}>
                      {loading ? <span className="spinner-border spinner-border-sm"></span> : 'Найти'}
                    </button>
                  </div>
                  {error && <div className="alert alert-danger">{error}</div>}
                  {searched && !loading && results.length === 0 && (
                    <div className="text-center text-muted py-5">
                      <i className="bi bi-inbox fs-1 d-block mb-3"></i>
                      Ничего не найдено
                    </div>
                  )}
                  {results.length > 0 && (
                    <div className="list-group shadow-sm">
                      {results.map((r, i) => (
                        <div className="list-group-item" key={i}>
                          <h6 className="mb-1">{highlight(r.title || r.h1 || '(без названия)', query)}</h6>
                          <p className="mb-1 small text-muted">{highlight((r.meta_description || r.description || '').substring(0, 200), query)}</p>
                          <small className="text-muted">{r.category && <span className="badge bg-light text-dark me-2">{r.category}</span>}{r.slug}</small>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ===================== App =====================
    function App() {
      const [authenticated, setAuthenticated] = useState(false);
      const [checking, setChecking] = useState(true);
      const [page, setPage] = useState('dashboard');
      const [editorId, setEditorId] = useState(null);

      useEffect(() => {
        API.checkAuth()
          .then(r => r.json())
          .then(data => { if (data.cookieMatch) setAuthenticated(true); })
          .catch(() => {})
          .finally(() => setChecking(false));
      }, []);

      const handleLogin = () => { setAuthenticated(true); setPage('dashboard'); };

      const handleLogout = async () => {
        try { await API.logout(); } catch (e) {}
        setAuthenticated(false);
        setPage('dashboard');
      };

      const handleNavigate = (newPage, param) => {
        if (newPage === 'logout') { handleLogout(); return; }
        if (newPage === 'editor') { setEditorId(param); }
        setPage(newPage);
      };

      const handleBack = () => { setPage('articles'); setEditorId(null); };

      const toggleSidebar = () => {
        const el = document.querySelector('.app-wrapper');
        if (el) el.classList.toggle('sidebar-collapse');
      };

      if (checking) {
        return (
          <div className="d-flex align-items-center justify-content-center vh-100 bg-light">
            <div className="text-center">
              <div className="spinner-border text-primary mb-3"></div>
              <p className="text-muted">Загрузка...</p>
            </div>
          </div>
        );
      }

      if (!authenticated) {
        return <LoginPage onLogin={handleLogin} />;
      }

      const renderPage = () => {
        switch (page) {
          case 'dashboard': return <DashboardPage onNavigate={handleNavigate} />;
          case 'articles': return <ArticlesPage onNavigate={handleNavigate} />;
          case 'editor': return <ArticleEditorPage articleId={editorId} onNavigate={handleNavigate} onBack={handleBack} />;
          case 'search': return <SearchPage />;
          default: return <DashboardPage onNavigate={handleNavigate} />;
        }
      };

      return (
        <div className="app-wrapper">
          <Header onToggleSidebar={toggleSidebar} onLogout={handleLogout} />
          <Sidebar page={page} onNavigate={handleNavigate} />
          <main className="app-main">
            {renderPage()}
          </main>
          <footer className="app-footer bg-body-secondary border-top">
            <div className="float-end d-none d-sm-inline">
              <a href="https://vetclub.ru" target="_blank" className="text-decoration-none">vetclub.ru</a>
            </div>
            <strong>VetClub Admin</strong> &copy; 2025
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
